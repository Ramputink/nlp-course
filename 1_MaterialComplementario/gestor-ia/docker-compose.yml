version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gestor-ia-postgres
    environment:
      POSTGRES_USER: gestor
      POSTGRES_PASSWORD: gestor
      POSTGRES_DB: gestor_ia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: gestor-ia-redis
    ports:
      - "6379:6379"
volumes:
  postgres_data:
